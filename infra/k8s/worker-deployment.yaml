apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentthat-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentthat-worker
  template:
    metadata:
      labels:
        app: agentthat-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/prajwal2006/agentthat-backend:latest
          command: ["python", "-m", "app.workers.job_worker"]
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentthat-secrets
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentthat-secrets
                  key: database-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
